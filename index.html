  #stats { display:flex; gap:10px; padding:0 24px 12px; flex-wrap:wrap; }

  .stat b { font-size:20px; display:block; }

  nav button { background:var(--card); color:var(--sub); border:1px solid var(--line); border-radius:8px; padding:8px 18px; font-size:14px; cursor:pointer; }
  nav button.on { color:var(--bg); background:var(--gold); border-color:var(--gold); font-weight:600; }
  .topbar { position:sticky; top:0; z-index:50; background:var(--bg); border-bottom:1px solid var(--line); margin-bottom:16px; }
  section { display:none; padding:0 24px 40px; }
  section.on { display:block; animation:fadein .18s ease; }
  @keyframes fadein { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  #cardgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(430px,1fr)); gap:14px; }
  #stats { padding:0 0 12px; }
  /* 标的详情视窗 */
  #modal { position:fixed; inset:0; background:#000000b3; display:none; z-index:100; padding:2.5vh 2.5vw; }
  #modal.on { display:block; }
  #mbox { background:var(--bg); border:1px solid var(--line); border-radius:14px; height:95vh; display:flex; flex-direction:column; padding:14px 20px; box-shadow:0 20px 60px #000a; }
  #mhead { display:flex; align-items:center; gap:14px; padding-bottom:10px; border-bottom:1px solid var(--line); margin-bottom:12px; }
  #mhead h2 { margin:0; font-size:20px; }
  #mhead .close { margin-left:auto; cursor:pointer; color:var(--sub); font-size:20px; padding:4px 10px; }
  #mhead .close:hover { color:var(--txt); }
  #mgrid { display:grid; grid-template-columns:1.35fr 1fr; gap:14px; flex:1; min-height:0; }
  #mleft { overflow-y:auto; min-height:0; padding-right:4px; }
  #mright { display:flex; flex-direction:column; gap:12px; min-height:0; }
  .mpanel { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; flex:1; min-height:0; overflow-y:auto; }
  .mpanel h4 { margin:0 0 10px; font-size:13px; color:var(--gold); position:sticky; top:-12px; background:var(--card); padding:4px 0; }
  .mpanel .post { margin-bottom:8px; }
  .mevt { font-size:12.5px; line-height:1.7; color:#c6cbd4; border-left:2px solid var(--gold); padding-left:10px; margin-bottom:10px; }
  .mevt b { color:var(--gold); }
  /* 全文阅读器 */
  #reader { position:fixed; inset:0; background:#000000c4; display:none; z-index:120; padding:2.5vh 0; }
  #reader.on { display:flex; justify-content:center; }
  #rbox { background:var(--bg); border:1px solid var(--line); border-radius:14px; width:min(760px, 94vw); height:95vh; display:flex; flex-direction:column; box-shadow:0 20px 60px #000a; }
  #rhead { display:flex; align-items:flex-start; gap:12px; padding:16px 22px 12px; border-bottom:1px solid var(--line); }
  #rhead h2 { margin:0; font-size:18px; line-height:1.5; flex:1; }
  #rhead .close { cursor:pointer; color:var(--sub); font-size:20px; padding:2px 8px; }
  #rmeta { font-size:12px; color:var(--sub); padding:8px 22px; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:center; }
  #rmeta a { color:var(--gold); text-decoration:none; }
  #rbody { flex:1; overflow-y:auto; padding:18px 26px 40px; font-size:14.5px; line-height:2.0; color:#d8dce3; white-space:pre-wrap; }
  #rbody img { max-width:100%; border-radius:10px; margin:10px 0; display:block; }
  .readbtn { display:inline-block; margin-top:8px; font-size:12px; color:var(--bg); background:var(--gold); border-radius:8px; padding:5px 14px; cursor:pointer; font-weight:600; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .card .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .card h3 { margin:0; font-size:17px; }
  .badge { font-size:11px; padding:2px 9px; border-radius:10px; font-weight:600; }
  .price { font-size:15px; margin:2px 0 8px; }
  .price small { color:var(--sub); }
  .verdict { font-size:12px; padding:7px 10px; border-radius:8px; margin:8px 0; line-height:1.5; }
  .chartbox { position:relative; margin-top:6px; }
  .chartbox canvas { width:100%; height:230px; display:block; }
  .ctip { position:absolute; display:none; background:#0f1115f2; border:1px solid var(--gold); border-radius:8px; padding:8px 10px; font-size:11.5px; line-height:1.5; max-width:240px; pointer-events:none; z-index:5; white-space:pre-wrap; }
  details { margin-top:8px; } summary { font-size:12px; color:var(--sub); cursor:pointer; }
  .up { color:var(--green); } .down { color:var(--red); }
  #gwrap { position:relative; height:72vh; background:var(--card); border:1px solid var(--line); border-radius:12px; }
  #gc { width:100%; height:100%; cursor:grab; }
  #gtip { position:absolute; display:none; max-width:300px; background:#0f1115ee; border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:12px; line-height:1.6; pointer-events:none; white-space:pre-wrap; }
  .note { font-size:11px; color:var(--sub); margin-top:14px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); }
  th { color:var(--sub); font-weight:500; font-size:12px; }
  #feedbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px; }
  #fq { background:var(--card); border:1px solid var(--line); border-radius:8px; color:var(--txt); padding:8px 12px; font-size:13px; width:240px; outline:none; }
  #fchips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { font-size:12px; padding:4px 11px; border-radius:12px; border:1px solid var(--line); background:var(--card); color:var(--sub); cursor:pointer; }
  .chip.on { background:var(--gold); color:var(--bg); border-color:var(--gold); font-weight:600; }

 posts: [
  {dt:"06-26 10:35", k:"pub", id:"2070335223120969870", t:"$AAPL 暴跌6%一天蒸发近3000亿，现在估值33PE，能买么？不能。股价或许不能再低，但是买股票一个重要原因不是因为它便宜。Apple净利近30%，但乔布斯后缺少创新，AI落后，压榨供应商策略走到尽头并开始反噬。AI客户给存储高价、长约和确定性，内存厂把稀缺产能卖给AI，Apple只能涨价把账单扔给消费者。33倍PE买一家靠涨价和回购维持增长、在AI时代失去创新领导力的成熟硬件公司，才是真正风险。巴菲特已经卖了七成还不够，应该清仓；Tim走人看新人能否上位才是投资时点。"},
  {dt:"06-26 10:21", k:"pub", id:"2070331612500553863", t:"什么叫竭泽而渔？2023年存储行业毛利负9%，行业快死了没人敢扩产；没有AI横空出世，Apple供应链压榨策略还能作威作福。现在报应来了，存储行业如美光与下游AI客户签长协锁价格，Apple发现上游供应商不再需要跪着求订单。Tim Cook九月下岗一点不冤；Apple一年赚上千亿美元，却长期把库存、扩产和周期风险甩给供应商。"},
  {dt:"06-26 05:47", k:"pub", id:"2070262732373590238", t:"$MSFT 微软创纪录：2000年以来最大单月跌幅，今年也跌了快30%，PE历史低点不到20倍，即便收入和盈利双位数增长且beat预期。这就是周报策略提到的，市场大幅波动下考验的是择股能力，不是什么下跌都可以买。不买MSFT这类创始人一个都不在、职业经理人当CEO的公司；这个点位再跌也跌不动，就看换不换CEO。"},
  {dt:"06-26 01:45", k:"subs", id:"2070201606185050602", t:"订阅者分享｜盘中Update重要解读：最新消费价格数据让市场误读利率最终方向，维持不会加息预测；但过程会很波动，因为加息预期会被美联储保留，让市场自己解读，作为压制金融条件和通胀预期的工具。策略维持周报：方向上不悲观，节奏上保持防守。逢高减仓、降低杠杆、保留现金，在基本面没有变化的情绪化闪崩中分批回补。今天是宏观标题触发的大型科技去拥挤和内部利润再分配；不是2008式流动性危机，也不是AI需求全面崩塌。长期投资者若此前控制过仓位，是不错的分批建仓区域，但不是all in。"},
  {dt:"06-25 00:12", k:"subs", id:"2069800765963854046", t:"订阅者专享｜$MU 估值财报前预测：适当延长2028峰值，2027收入和毛利继续提升，毛利提升85%场景下，强牛情景按80 EPS、15-17倍PE，大致在1200。目前估值贴近上次预测1000上沿。财报后需用最新数据精算，但可适当提升超级存储周期水位。仓位策略维持，做好仓位集中度管理，核心仓和技术仓按自身风险能力处理。"},
  {dt:"06-22 13:58", k:"subs", id:"2068936671404663238", t:"订阅者专享｜周报深度6/21《吹尽狂沙始到金：波动时代剩者为王》：市场波动加大，控制仓位，逢高减仓，降低杠杆，现金为王，保留进攻权。若基本面没变化下出现情绪化闪崩就是buy the dip。美联储新范式下Fed不再替市场压波动；AI股票占标普权重大，拥挤交易易踩踏。下周重点关注PCE/GDP、NVDA股东大会、MU财报、OpenAI新模型。核心仓不动，AI没有证伪；技术仓破结构减、站回结构加；现金仓也是仓位。真正清仓信号：油价失控、信用利差系统走阔、订单下修、AI Capex被砍、云厂商现金流撑不住资本开支。"},
  {dt:"06-18 07:26", k:"art", id:"2067388485351460881", t:"【长文】新主席首秀和美联储范式转移全解读指南：Warsh首秀核心不是利率，而是美联储不再给市场未来剧本，不再急着安抚每一次波动。Fed put退场后，市场要从'找Fed爹'转向寻找自身韧性。AI资本开支是声明里的隐藏主线：AI托住增长，让美联储可以更晚转向，但能把AI Capex转为收入、现金流和ROIC的资产仍有支撑。策略不是跌了买，而是旧规则恐慌造成的错杀才买；买的是分子仍扩张、分母压力可能缓解、但市场被新规则吓出来的价格。"},
  {dt:"06-08 12:18", k:"art", id:"2063838001697075273", t:"【周报深度 6/7 会当临绝顶】超级事件周：CPI/SpaceX IPO/Apple发布会/ORCL、ADBE财报/FOMC。核心判断：科技泡沫是M型双顶——第一个顶是利率/情绪/拥挤的交易性下跌（个人判断还没到），第二个顶才是基本面证伪（订单变差/毛利恶化/客户ROI不清/capex放缓=真正清仓信号）。只有资金成本系统性超过AI投资回报率才能刺穿泡沫。维持今年降息预期。操作：核心底仓穿越周期+战术仓看VWAP和承接右侧动手+不杠杆。Oracle/Adobe财报=企业AI两方向的试金石；SpaceX IPO=市场抽水测试，AI叙事从利润表走向资产负债表。"},
  {dt:"06-03 15:04", k:"art", id:"2062067803411403173", t:"【周报深度 5/31 他强任他强】六月核心看三件事：分子（Agentic AI能否创造真实企业生产力——token是孤勇者，必须通过企业数据/编排/权限/流程转化为组织生产力；看谁能成为企业AI执行层的中介）、分母（美联储的'降息期权'：油价下去+就业转弱→降息叙事合法化；油价已成选举/通胀/财政/衰退的共同分母）、仓位纪律（核心仓承接趋势+技术仓处理波动+现金仓等待尾部事件后的错误定价）。六月是分母窗口：能反弹的资产很多，能持续重估的很少。六月不是预测题，是纪律题。"},
  {dt:"06-05 06:40", k:"art", id:"2062665830215852458", t:"【长文】比特币投资终极指南（meme资产风险手册）：BTC从高点跌40%而科技股黄金涨40%+——两张溢价票同时过期：进攻叙事被AI抢走，防守叙事被黄金拿回，独占性下降后从图腾退回高beta流动性资产。温度计不是K线是高收益债信用利差；这轮是融资交易出清不是基本面定价；没有现金流锚=估值真空，共识破裂时地板变活板门。重新入场五条件：真反弹→回踩不创新低→利差收窄→新叙事→资金流回归。'不要买下跌，买制度切换。'"},
  {dt:"06-02 15:52", k:"art", id:"2061717684232859993", t:"【长文】$GOOG AI战争中焦土融资：市场看到稀释，Google看到AI终局战融资窗口。800亿=三张账单：算力（等看清需求产能已被锁走）、人才（300亿SBC税务=把AI人才战争成本制度化）、融资期权（保留现金/债务空间/降息窗口）。激进推演：400亿基建若做SPV首付可放大5-6倍至2000亿建设能力——AI基建金融工业化的启动信号。核心认知差：AI是搜索的范式替换，Google从'收流量税'变'收智商税'。这种决定一定是创始人下场。"},
  {dt:"05-21 14:23", k:"art", id:"2057346504604664307", t:"【长文】Agentic AI元年的最后一张门票（$NVDA深度）：最拥挤的英伟达反而没被完全定价。Q1首拆Hyperscale 380亿 vs ACIE 370亿（环比+31%）=AI工厂从云巨头扩散到企业/主权/工业。四大误解审计：ASIC吃标准化负载NVDA吃复杂性；CPU组织行动GPU产生智能（Vera CPU自己抢2000亿TAM）；compute 604亿+77%未走弱；生态资本循环建立在真实需求上（客户已盈利、老GPU租金上调）。估值语言改变：从卖卡到AI factory税收系统。脆弱条件：毛利掉/客户融资恶化/ACIE虚胖/compute走弱。"},
  {dt:"05-08 21:57", k:"art", id:"2052749682175357314", t:"【长文】新高泡沫还是旧范式破产（写给机构踏空者）：这次落后的不是散户是传统机构。核心认知差：CapEx只是支出=泡沫，CapEx是购买未来高毛利调用的入场券=重估。与互联网早期不同——头部公司一开始就高毛利高调用量高现金流转化。'旧世界看估值，新世界先改变分母。'若AI收入/云毛利/推理调用/企业工作流持续验证，这不是sell the news，是迟到资金的forced repricing。"},
  {dt:"06-12 02:40", k:"subs", id:"2065262999884255685", t:"订阅者专享｜$GOOG 基本面+技术面解读：800亿股权融资+AI CapEx上修+token价格战传闻=市场重新定义Google、二次审计'股权融资换AI未来能否产生足够每股回报'；OpenAI降价传闻正打在软肋上。盘中跌破4/30财报缺口下沿353最低344（补缺+倒车接人位），地缘缓和后收回358=宏观突发引发的假破位修复，不是底部确认。核心仓不恐慌不盲加，主线看AI capex能否转化为Cloud/TPU/Gemini/Search AI真实现金流（未证伪）；技术仓轻仓等回踩不破350或放量站回360再加；重仓370上方减一点（筹码集中）。等下周FOMC+财报验证token按结果计费模式，370站稳才是日线真修复，380+核心仓适当减压。长期目标价不变。"},
  {dt:"06-12 01:40", k:"subs", id:"2065247938000122051", t:"订阅者专享｜$SPCX 首日定价和投资指南：IPO原始配售建议20-30%回报开盘走人。$135=1.8万亿=2027年预期收入30倍PS；有机内生收入（Starlink/Space/xAI）只有300多亿美金，加Claude和Google算力合同才冲水到近600亿。1.8万亿意味着27年后净利率30%、收入增速35%+维持10年，要求极高；高开到2.2万亿=40PS（有机口径80PS）。热度一过+解禁+若算力合同只是短租、27年后收入掉速，估值非常脆弱。策略：SpaceX是好资产，但IPO价格已在卖终局；可买一点门票，不要用核心仓替市场买单；真喜欢稀缺性，等两个季度财报之后再审计。（公开预告：开盘估计涨20%突破2万亿）"},
  {dt:"06-11 06:25", k:"subs", id:"2064957141371523387", t:"订阅者分享｜$ORCL 的AI信号和估值范围及策略——什么是真正的token经济学？最大的信号，所有目前主流媒体和投行都没有意识到的，也是我之前在周报中强调：商业模式不是卖token，token多少没有关系，而是token作为智商的机器实现，我们买的是结果。Oracle财报最大价值，是根据AI结果计费。"},
  {dt:"06-11 05:48", k:"pub", id:"2064947951768871063", t:"$ORCL 财报后盘后大跌10%，这个合理吗？看到了什么不一样的地方？最大的变化信号是什么？估值多少可以值得买的高赔率？云业务已经占总收入一半，而且93%增长爆发的云基础设施，拉动云收入47%，进而总收入21%，而且待履约收入积累了6380亿，其中750亿美金是客户带资进场。"},
  {dt:"06-10 15:21", k:"pub", id:"2064729611985207393", t:"$LLY 财报后40%的收益，远超大盘和市场的波动平衡。认知差提前市场1-3个月，作为持续关注和投资的核心标的。最新的新一代药王减肥药的价值不止于减肥。市场还低估了什么？商业模式、竞争优势、估值区间、投资策略，详细见订阅者专享。"},
  {dt:"06-10 14:50", k:"pub", id:"2064721757999898980", t:"$AEO 财报后连续拉升15%回报，这是在整体股市大幅波动下。我在周报中分析的主题轮动到消费的原因。一般1-3个月认知差，虽然服装业不是那么性感的投资标的。"},
  {dt:"06-10 14:26", k:"subs", id:"2064715849781628935", t:"订阅者专享｜如何'买入下跌'还是结构性买入的操作策略。5月系列周报、6月初和这两周周报都强化一个观点：不是简单'buy the dip'，但也不是泡沫崩盘。现在买方机构都是量化交易，但给普通投资者讲一点基本的技术型策略。从这种事件性冲击看，是一个很好的适合个人投资的长期交易策略。"},
  {dt:"06-10 13:04", k:"pub", id:"2064695209347391807", t:"CPI这数据和我预想差不多，高的原因是油价，但去掉油价和食品的核心CPI涨幅0.2%，意味着住房和服务最大影响还在降温。下周看美联储会议，特别是新主席Wash的风格，加息概率基本没有，我个人觉得不排除下半年降息。当然周报说了，战争持续性不可测，地缘政治油价传导是变数。"},
  {dt:"06-09 17:30", k:"pub", id:"2064399763504853068", t:"今天市场不是'看到特朗普发文才开始跌'，而是盘中已经提前交易了伊朗因素加特朗普回应的概率。特朗普确认只是把已经在盘面里发生的概率交易再加速了一下。如果今晚不继续升级，且明天CPI低于预期，那么今天这波下杀很可能会被事后解释为错杀。"},
  {dt:"06-09 16:38", k:"pub", id:"2064386646204887554", t:"如何在市场波动下利用周报深度分析和个股估值去投资？$NVDA 案例。提醒：周报深度和单只公司估值文章是两套框架。周报讲短期策略——市场热度、资金拥挤、技术/事件博弈、油价通胀地缘冲击，这些变量会让一只好公司短期跌很多。但估值文章讲的是中长期定价锚。"},
  {dt:"06-09 03:07", k:"pub", id:"2064182618552172994", t:"$AAPL 最大的问题就是Tim Cook，这个发布会只要他在，不用任何期盼。巴菲特最大的正确就是继续减持苹果，增持谷歌。没有灵魂的苹果，没有任何创新想象力的苹果，手机下半年可能依然大卖，但是任何一个黑天鹅就可能摧毁它的价值——比如OpenAI或者Musk自己搞一个纯AI终端。"},
  {dt:"06-09 03:00", k:"pub", id:"2064180813118214387", t:"Agentic AI时代CPU的估值和投资策略。$AMD 和 $INTC 从财报后发布都有倒车接人的机会，一个月涨幅都在30以上。即便周五大跌也都有精准的投资策略和仓位指南，结合估值区间的逻辑推演。订阅者还可以结合案例分析，回撤如何buy the dip。"},
  {dt:"06-08 15:33", k:"pub", id:"2064007959055679576", t:"为何最新的消息不是小作文？谷歌和英伟达为何找 $INTC 作为新一代芯片的生产商？当然不是取代台积电，为何从封装测试就开始验证推进先进制程的代工？这对于Intel意味着什么？如何解读预测背后逻辑和下一步投资策略。"},
  {dt:"06-08 15:17", k:"pub", id:"2064003845533921538", t:"重大数据更新：纽约联储最新调查，美国5月一年期通胀预期下降至3.46%，前值3.64%。缓解周报中分析的市场加息预期的焦虑和风险。具体看周三CPI数据。三年期通胀预期持稳3.1%，五年期3%。5月家庭财务前景创2022年以来最差。"},
  {dt:"06-08 13:40", k:"pub", id:"2063979602838773812", t:"六月主旋律不是预测题，六月是纪律题。如何买卖控制风险和买点仓位。每次股市大跌大涨巨幅波动我都会贴心地转发主页文章专栏里两篇文章。第一篇是《踏空者指南》——当你认同一个长期主线，却错过第一阶段时，如何skin in the game，如何分批进入，避免用完美主义错过大周期。"},
  {dt:"06-08 13:30", k:"pub", id:"2063976908996419892", t:"$INTC 周五大跌，今天盘前涨超12%，报道称谷歌向英特尔下单逾300万颗TPU芯片。为何反复被摩擦？很多人看不懂，原因是'你不知道你自己不知道'。free的内容看不到看不懂，错过了就是最贵的。永远是追涨杀跌，三根阴线就改变信仰。"},
  {dt:"06-08 12:58", k:"subs", id:"2063968792343118078", t:"订阅者专享：什么叫做周报中的Buy the structure，$INTC 案例分析，复盘结合点位解析（下）。什么是不能再买信仰，要买结构：回踩能不能被接住，关键价位能不能站回去，均线和成交密集区附近有没有资金承接，反弹有没有量，新增信息有没有验证主线——这些才决定回调是机会，还是证伪前奏。"},
  {dt:"06-08 04:30", k:"pub", id:"2063841055548809521", t:"下周超级事件周迎来的不是黑天鹅，是灰犀牛：通胀魅影已经浮现，能不能刺穿AI泡沫？本周主题：会当临绝顶。CPI通胀数据/Apple发布会/Oracle、Adobe财报/SpaceX历史级IPO/世界杯开幕。这是买点，还是卖点？"},
  {dt:"06-08 04:18", k:"subs", id:"2063838001697075273", t:"订阅者专享｜超级事件周 周报深度 6月7日 会当临绝顶。最重要的CPI通胀数据，和一系列事件：SpaceX的IPO、Apple发布会、Oracle/Adobe财报，以及下周的美联储议息/新主席讲话、欧洲加息风险。简单判断：如果CPI超预期，将直接带来又一轮冲击大跌——会不会刺穿AI泡沫？"},
  {dt:"06-08 04:47", k:"pub", id:"2063845293955903546", t:"韩国的朋友，不是我没有提前告诉你们。韩国股市又一次跌停熔断了。这是迄今为止有记录以来最长的抛售：5月6日以来，外国投资者每天都疯狂抛售，韩国本地杠杆散户接盘。我之前已经一再提醒了，买方内部交流都了解到这种大的趋势。"},
  {dt:"06-08 02:30", k:"subs", id:"2063810905318752659", t:"订阅者专享 $LLY 重大药物更新进展和估值。最新一代减肥药Retatrutide的补充更新，在关节炎/睡眠呼吸/心血管/血压血脂糖尿病明显改善。意味着从礼来角度，减肥到全平台代谢药物的演变，医保的商业覆盖增强，可见的商业化模式更清晰。"},
  {dt:"06-07 16:31", k:"pub", id:"2063660248972615883", t:"这是第一时间对Google发布的基于25年论文的博客文章关于内存优化的系统解读。甚至在导致大跌后，贴心地在公共推文领域给了 $MU 的合理估值，当然之后是一路突破万亿估值了。恐惧的买点多大的超额收益——即便大跌也在短短几个月1.2倍回报。"},
  {dt:"06-07 15:49", k:"pub", id:"2063649606349762784", t:"Google的内存优化算法的后续又来了，这一次是不是要雪上加霜？$MU 有人把这个论文算法做成了开源工具发布，可以在Mac上跑，提升信息的检索效率——和减少内存没一毛关系。图书馆还在，提升的是检索和地址卡片，不是说图书馆的书都不要了。"},
  {dt:"06-06 06:49", k:"subs", id:"2063151165534277827", t:"订阅者专享 $MU 大跌后复盘和策略案例解析。这次下跌是就业大超预期利率风险/半导体拥挤交易/Semianalysis小作文放大的共振，不是HBM主线被证伪。谈一点技术博弈层面实操，毕竟主线没有证伪。（估值和策略见转发贴）"},
  {dt:"06-05 17:17", k:"subs", id:"2062946998781874673", t:"订阅者专享：市场大跌下'买入下跌'的策略盘中更新。无需恐慌，系统写会在周末更新。AI钢铁泡沫没有证伪，不会因为一个就业数据。但是分母端的利率上行风险短期也不能排除，市场会杀前期暴涨的半导体估值预期。"},
  {dt:"06-03 07:43", k:"subs", id:"2062077679642243120", t:"订阅者专享｜6月第一周周报的精细版本发布，配合Google的技术层面仓位策略解读。在第一时间上周末发布后整理细节解读版正式发布。周一盘后 $GOOG 就出现'黑天鹅'事件，无巧不成书。"},
  {dt:"06-01 23:26", k:"subs", id:"2061590326838788493", t:"订阅者专享 $GOOG 股权融资800亿美金事件更新。股权小幅稀释，这是谷歌为准备Agentic AI军备竞赛补充弹药，维持上期季报后的估值区间和定价，以及投资策略。AI投资者考虑配置的不是追涨杀跌小票，这是投资组合的长期核心标的。"},
  {dt:"06-01 07:18", k:"subs", id:"2061346660173935036", t:"订阅者专享 周报深度5/31 他强任他强 尾部事件冲击。何为尾部事件？黑天鹅？人擅长用最近经验影响预期，难以预测的极端拐点事件或者趋势变化才是关键。"},

  {dt:"05-18 08:04", k:"subs", id:"2056284732678377737", t:"订阅者专享 周报深度5/18 不畏浮云遮望眼。整个市场无疑已经很拥挤：10家半导体相关贡献84%的标普涨幅。何况美伊战争拖得越久，对通胀传导压力和耐心就越脆弱。现在处于什么阶段？产业是真的，价格小贵。"},

  {dt:"05-14 08:34", k:"subs", id:"2054842705583423766", t:"订阅者专享 $NVDA 估值调整和投资策略。事件性冲击：中国开放官方渠道进口英伟达H200（实际上走私已占20%/一年300亿以上），业绩不会有太大冲击，核心是情绪市场乐观冲击。近期供应链角度分析，大概率确认下周财报超预期。"},
  {dt:"05-11 06:33", k:"subs", id:"2053725129981698453", t:"订阅专享 周报策略5.10 坐看云起时。回顾从战争底部3/30以来的周报和股票估值策略：浮盈兑现、核心持有、下跌买入，享受这AI的钢铁'泡沫'。最大的风险就是不投资。不用担心什么泡沫论——无论从商业模式/资本投入回报/业绩增长/估值水平，都和00年科网完全不可比。"},

  {dt:"05-08 16:39", k:"subs", id:"2052790476730740865", t:"订阅者专享 $MRNA 估值和投资策略。今天暴涨原因很简单：只要有传染病新闻，这种直接消息冲击性股票直接受益。mRNA技术无疑是人类疾病治疗历史的核心突破，流感疫苗效果好、开发周期短、生产快、成本低，革命性创新。"},

  {dt:"05-01 14:37", k:"subs", id:"2050222978936222198", t:"订阅者专享 $INTC 价格记录复盘策略。财报后因OpenAI小作文故事下跌，到之前估测的80获支撑后，今天到第一目标价100元，也叠加周末期权市场逼空原因。短期完全资金博弈市场。建议获利了结从80增持的浮赢仓位。核心仓不变——如果因上涨超过你一半也要减。"},
  {dt:"04-30 13:53", k:"subs", id:"2049849686572585298", t:"订阅专享 $LLY 财报业绩和投资估值。糖尿病和减肥赛道我长期关注。这个市场特别是未来拓展到代谢类的心脏类肝脏类等的空间巨大，而且口服模式远超便捷性，卖方投行低估这个转变。减肥药现金流大举进入新的代谢/肿瘤和细胞治疗平台，长期更强。1200合理/1300目标。"},
  {dt:"04-30 08:03", k:"subs", id:"2049761655886684296", t:"订阅者专享 $GOOG 26Q1财报解读和投资策略。最核心看一句话：AI审计年，就是看这么多投资能不能在AI上面产生回报，体现在利润和现金流。今天给了近乎完美9.8分答案：花钱如流水但是数钱数到手抽筋。第一批AI投入已经同时点燃Search、Cloud、Backlog积压订单和Gemini API。"},
  {dt:"04-29 08:53", k:"subs", id:"2049411657794019788", t:"订阅者专项 $GOOG 周三财报前的策略/估值和仓位操作。谷歌的价值：现金流底盘就是广告搜索，按照AI搜索不被取代还能深化定价模式，中性偏乐观26年1500亿利润，按27倍PE，4万亿左右（倍数可以25-30）。云服务利润率提升（TPU的价值独一无二）。"},
  {dt:"04-24 07:35", k:"subs", id:"2047580156836106311", t:"订阅者专享 $INTC 最新估值和投资策略更新。复盘：很多老订阅者面临'幸福的烦恼'——财报后暴涨，仓位买少了卖多了卖飞了。这是后视思维，不可能从头吃到尾。对于这种财报前无盈利无现金流的纯博弈故事性公司，能从底部这么短时间反弹变现就是最好的操作。"}

  {id:"2063838001697075273", dt:"2026-06-08", title:"订阅者专享｜超级事件周 周报深度 6月7日 会当临绝顶", imgs:[], text:`最重要的CPI通胀数据，和一系列事件SpaceX的IPO，Apple发布会，还有Oracle/Adobe的财报，以及下周的美联储议息/新主席讲话，欧洲加息风险。

简单判断，如果CPI超预期，将直接带来又一轮冲击大跌/会不会刺穿AI泡沫？

首先谈，我可能错的最大风险是什么？错误的投资框架，再精确的点位也是精准的错误。现在核心判断就是AI泡沫存在么，利率调整能否刺穿。

核心的投资框架，整个市场基本上隐含假设是，即便通胀反复，美联储最后仍会降息，全球流动性最终会重新转向宽松。所以美伊战争已经持续100天，市场依旧视而不见。

上周的大超预期的非农就业，好似黑天鹅，超乎所有市场预期，意味就业不弱下，战争尾部时间持续油价高的传导，世界杯/美国中选都会让6/7月的服务业就业不差。

降息的概率继续压缩，已经转向加息预期，这种边际角度的拐点预期，从上周周报上可知，直接从估值的分母角度带来提升，分母变大，进而整体压缩市场的估值和乐观情绪。

但我个人认为，分母端利率上行/风险溢价上升/仓位拥挤/变现需求/都是从估值和情绪以及交易角度的调整下跌。

历史上看科技泡沫都是典型的M型双顶，第一个顶部往往难以预测，突发性引发的交易和情绪估值的压力下跌，这种下跌幅度快，需要等待承接。

但真正第二个顶部也就是，最终刺穿泡沫的一定是基本面证伪，就是从现金流折现角度，看分子，订单变差、价格下行、毛利恶化、客户ROI不清楚、capex开始放缓，那就不是机会，那才是真正的清仓。

个人判断目前是第一个顶，还没有到，因为市场普遍突然转向从降息到加息预期，这个概率不大，个人维持今年降息预期，至少是不加息大概率。

原因在于，之前周报也多次分享了，现在的通胀数据不是以往的全面过热，AI投资/油价/服务业粘性，降息不解决问题，反而会让目前K型复苏恶化，中长期AI对于整体经济的效率和通缩压力。

当然，短期验证就在本周CPI数据公布，我们无法预测，只能准备。个人偏向于核心CPI数据稳定。我的核心投资框架，很简单：高低利率不是关键，只有系统性的提升利率和资金成本，超过了AI的投资回报率本身，才能刺穿泡沫的真正审判。

从操作策略和仓位角度，持续上周6月初周报策略中有详细的指南和链接。不预测，做准备。活的长，才能走的远。从时间线上阅读复盘，包括具体的买入时机，不是buy the dip而是buy the structure。

Core核心底仓，负责穿越周期。只要你持有的AI核心资产，其订单、价格、交付和Capex没有被系统性证伪，就不要因为单个月份的CPI波动交出筹码，但必须做好动态再平衡，避免单一高热资产绑架整个组合。

战术波动仓，负责处理博弈。跌了不要盲目接飞刀，必须观察成交密集区、VWAP（成交量加权平均价）以及机构资金的承接意愿，右侧确认结构后再动手。具体看案例以前分享，特别是从基本面优秀的科技平台、算力、存储之前谈的标的。

保持合理现金流不要杠杆，组合适当的多元配置。

需要特别关注几个事件性：

Apple发布会，Siri重大升级能否抢占Agentic AI在消费端的底层分发权。AI第一阶段卖铲子/算力存储，第二阶段看企业生产力，如果第三阶段的苹果不能把AI转化为跨App执行、读取上下文的系统级操作层，甚至无法给出明确的换机理由，那么整个AI的消费端投资回报就会遭到资本市场终极拷问。

Oracle和Adobe财报，比表面上更重要。因为它们分别代表企业AI的两个方向：Oracle看AI基础设施和企业云需求。Adobe看AI应用、内容生产率和软件定价权。

特别是看指引，如果都强，那么AI主线会从卖铲子继续向企业生产力扩散。如果基础设施强但应用变现弱，市场会继续偏好硬件和平台，软件分化加剧。如果基础设施和应用都弱，AI的投资回报质疑会明显升温，这可能触发第二轮大跌。

SpaceX IPO一定是市场热点，这个估值已经不是一个火箭公司，包括最新的和Google的算力合同。被市场包装成一个大拼盘，火箭/卫星互联网/全球通信网络/AI算力/太空数据中心。

市场钱多的事，主要看市场的情绪和偏好的抽水测试。AI科技基建开始向公共市场要钱了，谷歌先发优势，后面会不会引发一系列科技公司融资潮。这说明AI叙事正在从利润表向资产负债表转移。

如果SpaceX能被市场稳稳接住，说明资金对长周期护城河的信仰还在；如果定价过满、承接乏力，机构为了买新故事就必须抛售现有的赢家，这极易引发前期拥挤仓位的多杀多。

一系列重要数据和事件需要跟进审判，订阅者从主页点击"订阅专栏"按时间线浏览，我会及时突发事件update解读和预测分析。

  {id:"2062067803411403173", dt:"2026-06-03", title:"订阅者专享｜周报深度 5/31 他强任他强：尾部事件冲击下的六月买方策略", imgs:[], text:`他强任他强：尾部事件冲击下的六月买方策略。6月1日上海两千多万人从Covid封控中走出来的日子。如果在2020年初，有人告诉你，一座中国最国际化的大都市会经历那样的封控、停摆和集体记忆，你会信吗？

这就是尾部事件。不是因为它一定没人想到，而是因为人在趋势中，总是高估眼前秩序的稳定性，低估极端拐点对现实世界的冲击。

市场也一样。人类擅长把最近发生的事情外推成未来，却不擅长理解真正的结构性跳变。半导体存储就是例子。2023年DRAM和NAND还在周期低谷，市场规模不到千亿美元级别，到了2026、2027年，AI需求和价格周期把整个行业重新推到完全不同的量级。你让分析师在低谷线性预测十倍变化，很多模型都没有意义。

所以本周的标题是金庸那句话：他强任他强，清风拂山岗。外部越乱，越要有自己的内在秩序。

但这里的"坚定"，不是无脑all in，不是喊口号，也不是抱着一个股票谈恋爱。真正的坚定，来自你知道自己该看什么，知道什么变量在改变，知道什么价格已经包含了什么预期，知道仓位该如何承受尾部事件冲击。

六月核心就看三件事：分子、分母、仓位纪律。

一、先看分子：Agentic AI是否开始创造真实企业生产力

估值看未来现金流折现，首先看分子。现在市场真正的主线，仍然是Agentic AI。AI从训练走向推理，再走向代理智能体，不只是模型变聪明，而是AI开始有目的、有执行、有反馈，开始真正进入企业生产流程。这才刚刚开始。

过去几年，AI基础设施硬件是最先兑现的卖铲子环节。GPU、网络、内存、服务器、电力、液冷，这些是第一阶段。但如果AI的最终闭环只是消耗token，而不能让客户挣钱，不能让企业把AI部署成生产力，最后一定会一地鸡毛。客户不挣钱，AI capex的经济学就闭不上。

所以真正的第二阶段，不只是"更大的模型"，而是"有用的AI"。所谓有用，就是AI能进入企业组织，理解上下文，连接数据，执行流程，降低成本，提升收入，缩短周期，减少人力摩擦。

这里就会出现一个巨大问题：模型本身只是能力，不是组织生产力。token本身是孤勇者。它必须通过企业数据、上下文、软件编排、安全、调度、权限、流程和反馈机制，才可能转化成真正的组织生产力。

这也是为什么未来真正值得看的SaaS，不是简单接一个AI接口，而是谁能成为企业AI执行层的"中介"。谁掌握企业数据和上下文，谁能把AI编排进真实工作流，谁能保证安全、权限、调度、审计和执行，谁才可能在Agentic AI时代活下来，甚至重估。

这也是我一直讲的AI创新扩散。早期是高价值白领知识工作者。再往后，是企业和大众场景的传统扩散。中间有一道鸿沟。跨不过去，AI基建就是资本开支狂欢。跨过去，AI才能形成投资回报闭环。

这就是六月策略的第一个锚：AI主线没有结束，但市场会越来越严厉地区分：谁只是讲AI，谁真的把AI变成企业生产力。

二、再看分母：油价、通胀、就业和美联储的降息期权

分母看折现率。折现率背后，是通胀、利率和风险溢价。六月最重要的分母，不是美联储嘴上说什么，而是两个条件能不能同时出现：油价下去，就业转弱。

美联储新主席上任后，通胀观察口径出现变化，开始更重视一种剔除极端波动后的通胀指标。学术细节不展开，本质就是减少短期冲击对通胀数据的干扰，让政策有更大的解释空间。

这意味着什么？不是美联储一定降息。而是美联储获得了一个"降息期权"。只要油价中枢下移，就业数据开始弱化，降息叙事就会突然变得有合法性，而且这可能超出市场预期。

这就是为什么美伊局势和油价如此重要。特朗普不是突然爱和平。油价已经从外交问题，变成选举、通胀、财政成本和衰退风险的共同分母。

中选进入下半场，产油州和耗油州的政治诉求不一样。油价如果长期维持高位，美国年底经济衰退风险会抬升，财政成本也会被高利率和高油价双重压迫。美伊局势如果降温，油价中枢下移，美联储就更容易行使这个降息期权。

所以六月市场的关键不是一句"降息来了"。更准确地说：降息期权重新有价值，但是否行权，要看油价和就业。

如果6月就业数据开始弱化，同时油价下行，市场会先交易分母修复。小盘成长、软件、REITs、消费可选、高久期资产，都会有一波反弹，AI抱团压力也会阶段性缓解。

但这不是主线切换，降息只是降低分母，AI才是在改变分子。一旦降息靴子落地，或者降息期权无法真正行使，资金仍然会回到AI核心资产：半导体、内存、服务器、CPU、网络、电力，以及真正能承接AI生产率的软件。

六月不是简单risk-on，这是一次分母窗口，能反弹的资产很多，能持续重估的资产很少。

三、预测未来很可笑，但估值锚点必须存在

无论分子还是分母，人的预测能力都非常有限。我可以说自己在一些主线上领先市场一到三个月，但这又如何？

Intel 70美元的时候，我会说必须看财报验证。MU接近500美元的时候，我也会说先减仓为敬。看对方向，不等于可以放弃纪律。因为公司不是静态函数，市场不是静态模型，CEO也不是静态变量。这就是投资最难的地方。

你不可能提前精确预测所有动态变化。一个公司的内在发展，有人的主观能动性，有管理层的战略学习，有供应链、库存、客户需求、技术路线和资本市场反馈。很多东西，连CEO自己也在动态学习。

Intel就是典型例子。你很难在一年前精确预测到，AI发展到这个阶段后，CPU会在推理和Agentic AI架构里重新被市场重视。过去所有人只盯GPU，后来才发现，大规模智能体运行需要的不只是算力，还有CPU、内存、网络、存储和调度。甚至管理层自己一个季度前还在强调库存管理，结果需求结构一变，原来被视为包袱的库存和产能，可能突然重新变成收入和毛利的来源。这就是企业经营的真实世界。

所以估值有没有意义？当然有。但估值不是静态算命。估值是锚点，是你面对新信息时不断更新判断的坐标系。未来现金流折现，本质上不是为了算出一个永恒不变的目标价，而是为了回答几个问题：

市场现在相信什么？这个信念已经支付了多少价格？新的数据是在验证原假设，还是推翻原假设？企业的竞争优势持续期是被延长，还是被压缩？管理层有没有能力把沉睡资产重新激活？

这背后就是人的价值，CEO的价值，企业创造性的价值。AI时代很容易让人误以为一切都可以模型化。其实真正值钱的公司，最终仍然要看人如何组织技术，如何调用资源，如何把复杂系统变成可执行的生产力。伟大的CEO不是财报上的一个注脚，而是企业价值创造路径里的核心变量。

四、投资不是预测一切，而是准备

既然未来不可预测，投资者该怎么办？答案不是躺平，也不是满仓赌命。答案是准备。

你要有核心仓，也要有技术仓。你要知道现金也是仓位。你要知道什么时候该持有，什么时候该审计，什么时候该在狂欢里减一点，什么时候该在恐慌里加一点。

如果你看好AI主线，就不要因为几个点的波动被洗出去。但如果一个标的在高位、财报前、市场热炒中、期权情绪极端时，你也不能假装风险不存在。

核心仓负责承接大趋势，趋势不变无畏风雨。技术仓负责处理波动，看你的时间精力/睡觉和风险能力。现金仓负责等待尾部事件之后的错误定价。这才是买方纪律。

六月尤其要注意：如果通胀和利率下行预期升温，部分前期落后资产会有补涨窗口。但这不是让你抛弃主线去追所有反弹，而是让你在组合里适当布局被分母压制、但基本面没有破的资产。

真正重要的是区分：什么是反弹？什么是重估？什么是逼空？什么是主线？什么只是流动性修复？市场最容易让人犯错的地方，就是把所有上涨都当成新主线，把所有下跌都当成结束。

五、订阅者本周最重要的任务

新订阅者请务必先读《订阅者指南》。那不是社区规则，而是投资心法。这个订阅不是点单台，也不是私人投顾。我不会根据个人需求回答某只股票多少钱买、仓位怎么配、目标价多少、要不要止损。你真正应该做的，是学会读懂主线、验证假设、理解仓位纪律。

我主页文章专栏里，有两篇文章尤其重要：第一篇是《踏空者指南》。它讲的是当你认同一个长期主线，却错过第一阶段时，如何skin in the game，如何分批进入，如何避免用完美主义错过大周期。第二篇是《投资者如何面对事件性冲击的投资和仓位指南》。这篇更适合现在。它讲的是尾部事件冲击下，如何管理核心仓、技术仓和现金仓，如何在不确定性中保持可行动性。

六月不是预测题，六月是纪律题。你不是要猜对每一个数据，而是要在数据出来之后，知道它改变的是分子、分母，还是只是市场噪音。

六、最后：AI时代最贵的不是token，而是判断责任

最后讲一句更革命性的问题预测。AI时代，输出越来越便宜。token越来越多，文章越来越多，摘要越来越多，观点越来越多。但真正稀缺的，不是文字数量。真正稀缺的是判断、取舍、责任和可复盘的因果链。

黄仁勋在台北演讲反复强调的方向，本质上就是"有用的AI"。AI最终不是为了生产更多文本，不是为了消耗更多token，而是要产生更好的结果。

投资内容也一样。不是谁写得多，谁就有价值。不是谁生成得快，谁就有价值。真正有价值的是：在复杂市场里，谁能把变量压缩成判断，谁能在不确定性中给出边界，谁能在事后复盘自己的错误，也能在关键时刻坚持自己的主线。

我上面这些文字，都是一个字一个字写出来的，然后通过AI排版格式优化。这不是因为人工输入本身神圣，而是因为这些文字背后有取舍，有风险，有判断，有过去几个月周报系列不断验证和修正的痕迹。

AI可以生成内容。但真正的买方判断，要对结果负责。未来AI终局的价值，也不是token输出量，而是最终结果。对企业如此，对投资如此，对内容也如此。

一字千金，不是因为字贵。而是因为判断贵。

  {id:"2062665830215852458", dt:"2026-06-05", title:"比特币投资终极指南 也是所有meme叙事资产的风险手册", imgs:[], text:`2万亿灰飞烟灭从去年10月最高点。比特币跌落神坛过去一年下跌40%，而同期科技股和黄金都大涨超40%，市场流动性没有问题那么这次什么不一样？是不是抄底了？

比特币投资的唯一指南：别猜底，等制度切换。

过去一年，市场给了比特币一个很难看的答案。科技股、AI、算力、半导体、软件平台不断吸走全球风险资本的注意力，而比特币却从"未来资产"的神坛上不断下滑。最近这一波连续大跌，更像是一次残酷的现实校准：当市场还没有真正进入系统性恐慌，当流动性并没有完全枯竭，比特币却已经先崩了。这才是最重要的信号。

很多人现在的问题仍然是："比特币是不是到底了？"但我认为，这个问题本身就问错了。

比特币不是一只普通股票。它没有现金流，没有利润表，没有分红，没有投资回报概念，也没有一个可以用现金流折现慢慢倒推的企业价值底座。它真正的底层资产不是代码，而是共识；真正的风险不是波动，而是共识断裂之后的估值真空。

所以，比特币投资的关键从来不是"跌多了能不能买"。真正的问题是：它的叙事有没有重新建立？流动性有没有重新支持？信用市场有没有重新配合？新的买盘逻辑有没有出现？如果这些问题没有答案，那么所谓抄底，只是把风险管理交给信仰。而信仰，从来不是风险管理。

一、比特币真正危险的地方，不是跌幅，而是背景

如果一个资产在宏观逆风里下跌，这不奇怪。但这一次更值得警惕的地方在于：比特币不是在最坏的宏观天气里才开始崩，它是在市场整体还没有全面失控时，就已经先出现了内部失血。

信用利差没有真正爆炸，股票市场也没有进入系统性崩盘，市场仍然愿意给AI、科技股和高质量成长资产定价。但比特币却持续下滑，甚至跑输它原本最应该绑定的风险偏好主线。这说明问题不只是宏观。它更像是比特币自身的买盘结构、叙事结构和资金结构出现了松动。

如果一个资产在"好天气"里都无法维持买盘，那么当真正的"坏天气"来临，它面对的就不只是下跌，而是估值框架重新塌陷。

二、比特币的两张溢价票，正在同时过期

比特币过去能够获得极高估值，是因为它被市场赋予了两种资产身份。

第一，它是未来技术的代理资产。在AI尚未全面爆发之前，比特币承载了很多人对下一代互联网、去中心化金融、数字主权和新金融秩序的想象。

第二，它是数字黄金。在央行扩表、财政赤字、货币贬值的时代，比特币被包装成一种新型避险资产。

问题是，到了今天，这两套叙事都遇到了更强的竞争者。进攻端，AI才是真正的生产力革命。资本如果要买未来技术扩张，它现在买的是GPU、HBM、数据中心、电力、云计算、AI软件和企业自动化，而不是区块链叙事。防守端，黄金重新证明了自己的地位。最终被大规模购买的仍然是实物黄金，而不是数字代码。

于是比特币陷入了一个很尴尬的位置。它既不像AI那样代表新一轮生产率革命，也不像黄金那样拥有主权资产负债表级别的防守需求。它不再是唯一的进攻资产，也不再是唯一的防守资产。这就是叙事挤压。

一个资产最危险的时刻，不是别人开始反对它，而是市场发现它已经不是唯一答案。

三、不要看RSI，要看信用利差

很多人在比特币暴跌之后，第一反应是打开技术指标。RSI超卖了吗？均线支撑到了吗？用这些判断比特币的底部，就像用尺子去测量地震。

对于宏观交易者来说，比特币真正的温度计不是K线，而是高收益信用利差（美银美国高收益债券指数期权调整利差）。这是我全网最早提出的核心概念指标。

逻辑很简单：信用利差收窄，说明市场愿意承担风险，融资环境宽松，风险资产容易上涨。信用利差扩大，说明市场开始恐惧，资金成本上升，高beta资产会被杀估值。

比特币过去很多时候，本质上就是全球流动性的高beta衍生品。当钱便宜、风险偏好高、杠杆愿意扩张时，比特币涨得比多数资产快。当融资成本上升、风险偏好下降、杠杆开始收缩时，它跌得也更快。

真正让我警惕的地方在于：如果信用利差还没有明显恶化，比特币就已经撑不住，那么这说明它不是在宏观风险释放之后被杀，而是在宏观风险真正到来之前，先暴露了自身脆弱性。这不是普通下跌。这是资产内部结构出现的裂缝。

四、这轮下跌更像融资交易出清，不像基本面定价

如果你把视野放大，会看到一个更清楚的画面：比特币并不是孤立下跌，它和一批高久期、高波动、依赖融资条件的资产一起被重新定价。这更像融资交易的出清。

当资金便宜时，市场喜欢讲故事。当资金开始变贵，故事之间的区别会被压缩，所有靠同一类钱买进去的资产，最后往往会被同一类钱卖出来。这就是为什么在真正的压力阶段，资产相关性会突然上升。平时大家都有自己的故事。压力一来，所有故事都变成同一个词：去杠杆。

这也是为什么我不喜欢用"跌多了"作为买入理由。因为如果下跌来自情绪，跌多了可能有反弹。但如果下跌来自杠杆出清，第一次大跌往往只是风险重新定价的开始。

五、比特币最大的风险，是估值真空

股票跌了可以抄底，为什么比特币跌了不能抄？答案在于，锚不一样。

股票背后有公司。哪怕股价跌了50%或70%，你仍然可以回到企业本身：收入、利润、现金流、客户、产品、资产、负债、竞争优势、管理层、资本回报。这就是为什么真正的价值投资者敢在股票市场买血。因为血后面有造血的企业。

但比特币不一样。它的价格地板不是现金流，而是共识。上涨时，共识是天花板。下跌时，共识一旦破裂，所谓地板就会变成活板门。

所以接比特币的飞刀，和买入一家被错杀的伟大公司，不是同一种交易。你买股票的下跌，买的是企业现金流被市场恐慌打折。你买比特币的下跌，买的是人群未来重新回来的希望。这不是说比特币一定不能买。而是说你必须诚实地承认：你买的不是便宜现金流，而是共识修复。这是完全不同的风险结构。

六、为什么"跌多了"不是买入理由

比特币的修复依赖三个东西：新的叙事、新的流动性、新的边际买家。如果这三个东西没有出现，价格低并不代表价值高。很多人以为自己在买便宜筹码，其实只是在接别人撤退时留下来的库存。

这就是我为什么说，不要买下跌，要买制度切换。下跌只是价格变化。制度切换才是风险结构变化。

七、我的交易框架：不要当英雄，要当有耐心的鳄鱼

我不会猜比特币的底。猜底很多时候只是披着分析外衣的自尊心。宏观投资真正重要的不是证明自己勇敢，而是等待赔率变得不对称。

现在比特币的问题在于，下方是估值真空，上方是套牢供给。价格当然可能反弹，甚至会有很猛烈的技术性反弹，但这不等于趋势已经修复。

我预设的条件要审计：第一，要先看到一轮真正的反弹。不是为了追涨，而是为了证明市场已经不再处于单向清算状态。第二，反弹之后必须回踩，但不能再创新低。周线级别出现更高低点，才说明结构开始稳定。第三，信用利差必须停止恶化，最好重新收窄。第四，必须出现新的叙事，不是旧口号的重复。不能只是"跌多了""减半了""长期看好""机构会回来"。市场需要新的边际买家和新的资产定位。第五，资金流必须证明自己。ETF、现货买盘、链上长期持有人、衍生品杠杆结构，都要从撤退变成重新吸收供给。

没有这些信号，你不是早。你只是第一个排队给别人提供流动性。这个市场不奖励勇敢。它奖励耐心。在这种位置，要像鳄鱼一样思考。不要在深水里和猎物搏斗。等市场自己耗尽，等价格漂到浅滩，等猎物进入你的胜率区。

八、真正的问题不是能不能涨，而是你能不能活到它涨

比特币未来当然可能重新上涨。但投资里最危险的错误，就是把"终局可能正确"误认为"路径可以忽略"。很多人死掉，不是因为他们看错终点，而是因为他们熬不过路径。

信仰可以让你持有。但信仰不能替你管理风险。真正重要的问题不是比特币未来有没有机会，而是你现在买入时，赔率是否已经转好。你以为自己在逆向投资。其实你只是在和流动性作对。

结论：不要买下跌，买制度切换

比特币这一轮下跌真正暴露的问题，是它在AI抢走进攻叙事、黄金抢走防守叙事之后，独占性正在下降。它仍然可以交易，仍然可以反弹，但前提是它必须重新找到自己的制度位置。在那之前，所有"跌多了"的论证都不够。

比特币不需要你勇敢。它需要你冷静。不要问是不是到底了。要问共识有没有重建，流动性有没有回归，信用市场有没有配合，新的边际买家有没有出现。如果答案还没有出现，就继续等。

不要买下跌。买制度切换。

最后你以为我只是说比特币投资指南么？No，这是一切投资没有底层现金流只有信仰的meme股票的终极指南。`},
  {id:"2061717684232859993", dt:"2026-06-02", title:"深度解读：$GOOG AI战争中焦土融资", imgs:[], text:`市场看到的是稀释，Google可能看到的是AI终局战的融资窗口。这个股权融资决策者是谁？Google明明是全世界最会赚钱的公司之一。账上还有上千亿美元现金，过去一年自由现金流超过600亿美元，信用评级也足够强。按传统理解，这种公司如果要投AI，要么用经营现金流，要么发债，怎么也不应该在这个时候大规模发股，主动稀释老股东。

所以市场的疑问很自然：Google是不是缺钱了？AI capex是不是已经大到现金流扛不住了？这个解释没错，但只停在第一层。

如果只用过去十年的互联网公司框架看Google，市场可以合理质疑。因为过去的Google是一个轻资产现金流机器。搜索广告、YouTube、Android、Chrome、默认入口，这套系统不需要像工业公司一样不断吞噬资本，却能持续产生高利润。

但AI时代正在把这个前提改写。未来的Google可能不再只是一个搜索广告公司，而是一个全栈AI基础设施平台。它要同时控制模型、芯片、数据中心、电力、企业订单、开发者生态和Agentic AI的工作流入口。这就不是传统互联网生意了。这是重资产战争。也是资产负债表战争。

这次融资最容易被误读的地方：市场会盯着800亿美元这个数字，马上算稀释（约2%），再看Berkshire以350美元附近的折扣价接100亿，得出"Google股价不便宜"的判断。这些判断都成立。但它们没有回答真正的问题：为什么一家仍然有强现金流、强资产负债表、强信用能力的公司，要在这个节点主动把股权融资拿出来？

我的理解是，Google不是缺钱，而是不想把未来几年的AI战争融资路线走死。债务市场现在不便宜。长期债一旦发出去，就会把未来多年AI投资的不确定性变成固定利息压力。如果未来真的有降息窗口，现在把债务空间一次性用掉，反而不划算。股权融资理论上更贵，但在当前市场环境下，Google的股票仍然是一种昂贵货币。这不是财务上的求生。更像战略上的提前占位。

800亿不是一张账单，而是三张账单。

第一张，是算力账单。Google现在的问题不是没有需求，而是供给不够。AI搜索、Gemini、Google Cloud、TPU外部化、企业AI服务，都需要更大的算力底座。AI基建最残酷的地方在于，等你看清楚需求，产能已经被别人锁走了。所以Google如果真的相信Agentic AI会带来下一轮巨大需求，它必须提前建设。不是为了下一个季度EPS，而是为了未来三到五年的供给权。

第二张，是人才账单。很多人看到ATM中约300亿美元预计用于员工股权奖励归属相关税务义务，会觉得这是负面信号。但这恰恰说明，AI战争不是只烧机器，也烧人。当AI人才战争进入这个级别，股权激励就不再只是HR工具，而是资本结构的一部分。Google把分散的员工卖股压力，转化成可管理、可披露、可节奏化的公司融资行为。这不是帮员工做慈善。这是把AI人才战争的真实成本制度化。

第三张，是融资期权账单。Google真正需要的是在不确定的AI终局前，保留现金、保留债务空间、保留未来降息后的融资可能性，同时又不放慢当下的基础设施建设速度。它买的不是一笔钱，买的是时间、弹性和选择权。

真正激进的地方，还没有写在headline里。如果其中真正用于AI基建的400亿美元，不只是直接花掉，而是作为类似数据中心SPV结构杠杆放大，通过项目融资、私募信贷、长期租约和容量承诺放大5到6倍，那么真实建设能力就不再是400亿，而可能是2000亿美元级别。这当然还不是官方确认的事实，只能作为推演。但这个推演非常重要。

因为AI基础设施正在进入一个新阶段：科技公司不再只是用自己的现金流买服务器，而是用股权做首付，用信用做杠杆，用长期需求做抵押，把私募资本、债券资金和基础设施基金全部拉进来。这就是AI基建的金融工业化。如果Google也走向这条路，那么这次融资就不是一次普通增发，而可能是下一轮AI基础设施杠杆化的启动信号。

职业经理人看报表，创始人看终局。CEO Sundar和CFO当然会看评级、债务空间、稀释、现金流。但Larry和Sergey这种创始人，对技术拐点的感受往往不是财务模型能完全解释的。他们可能更早感受到一件事：AI不是搜索广告的一次功能升级。AI可能是搜索本身的范式替换。

过去Google的核心是"你来找信息"。未来Agentic AI的核心是"系统替你理解、判断、执行"。一个是流量入口，一个是智能入口。一个卖广告位置，一个卖决策能力。如果这个变化真的发生，Google的未来估值就要围绕它能否成为AI时代的智能基础设施平台展开。这才是最大的认知差。

市场还在问：搜索广告会不会被AI冲击？更大的问题是：如果Google成功把搜索、Gemini、TPU、Cloud、YouTube、Android和企业AI服务连接起来，它会不会从"收流量税"的公司，变成"收智商税"的公司？过去Google赚的是注意力的钱，未来Google想赚的是认知和执行的钱。

人类预测面对指数级变化，往往很苍白。就像早期互联网，很多人能看到网页广告，却看不到搜索会成为全球商业入口。现在Agentic AI也是类似的时刻。范式变化一旦发生，传统预测模型会失效得非常快。好比存储行业，3年间1000亿到1万亿的市场10倍放大，超乎所有的估值模型和假设。

这次融资真正要放进主线里看，不是"Google缺不缺钱"，而是"Google是否正在为一次范式转移抢时间"。如果Agentic AI最终只是一个更贵的聊天机器人，那么这次融资就会变成高位稀释股东。但如果Agentic AI变成企业生产系统、个人工作流入口、搜索广告的新形态、云服务的新消耗层，那么Google现在做的一切都会显得非常合理。

用Berkshire这种长期资本建立估值锚，然后在Anthropic、OpenAI、SpaceX等超级资产登陆公开市场前，先把自己的资本弹药拿到手。这不是普通融资，这是抢地盘。AI时代的地盘不是土地，而是算力、电力、模型、分发入口、企业订单和人才密度。

最后的判断：Google不是没钱，是不想在AI终局战之前，被现金流、债务评级、员工激励和市场窗口绑住手脚。这次融资表面上是稀释，骨子里是买主动权。这件事当然有风险，如果AI需求兑现不了，今天的股权融资和未来可能的杠杆化基建，都会变成沉重包袱。但如果创始人对终局的直觉是对的，那么今天的稀释只是门票，真正的回报来自范式转移。

市场或许还在用旧Google的尺子，量一个正在变化的新Google。`},
  {id:"2057346504604664307", dt:"2026-05-21", title:"Agentic AI 元年的最后一张门票（$NVDA深度）", imgs:[], text:`为什么最拥挤的英伟达，反而还没有被完全定价。难道大或者太过完美就是我的错？今天最新的英伟达财报Q1季度发布，盘后股价波澜不惊。再回首21年时间公司的收入从20亿到超过2000亿，复利增长25%/年，27年预期再翻倍4000亿。从ChatGPT发布以来业绩增长8倍，市值5.4万亿第一头牌。

市值第一大股票该配的能配的主动式被动式基金机构好像都配置了，仓位极度拥挤，即便是不断季报的各个指标超预期，也一如既往不能吸引新增买家入场，太完美是我的错么？市场究竟看错了什么，存在什么样的认知差？

本质上这轮半导体从美伊停战以来的几乎垂直反弹，年内50%涨幅背后不单纯是停战风险，而是真正的整个真实世界的AI从去年11月开启的一次范式转换。市场从训练、到推理，到真正意识到Agentic AI也就是自主执行的智能体AI时代的开启。

AI模型从回答问题，进化到拆任务、调工具、写代码、跑流程、控制系统、到真正能产生收入。token不再是演示成本，开始变成经济活动本身。半导体、HBM、CPO、云厂商、NeoCloud、CPU、电力，整个链条已经被重估过一轮。但站在这套系统最中心的公司，反而仍然是这一轮里风险收益最合理的资产。是英伟达 $NVDA。

$NVDA Q1真正要看的，是三件事：

第一，Agentic AI已经从概念真正从财报中体现。训练、推理、工具调用、CPU编排、GPU推理、网络、存储，正在被打包成一个完整的AI factory系统。

第二，市场对英伟达的担心大量停留在老的"遗留"问题上：TPU/ASIC替代？CPU削弱GPU？财报中是不是隐藏猫腻？投资其他产业链企业是循环融资？这些问题当然需要持续跟踪审计，但多数被市场误读。

第三，英伟达不能再按传统半导体公司估值。它不再是"卖卡的卖GPU"，而是卖的是一个平台AI工厂系统。

看数字：Q1收入816亿，同比+85%。Data Center 752亿，同比+92%。Q2指引910亿，不含任何中国Data Center compute收入预期。数字很强，但更关键的是结构。

第一次，财报分类中英伟达把Data Center拆成Hyperscale和ACIE。Hyperscale是云巨头大厂，ACIE是AI Cloud、Industrial、Enterprise。过去市场最大的担心是英伟达过度依赖五六家hyperscaler。这次答案给出来了：Hyperscale 380亿，ACIE 370亿，ACIE环比+31%。

这意味着AI工厂建设正在从云巨头扩散到AI native clouds、企业、工业现场、主权AI、边缘设备和physical AI。它不再是一场只有Big Tech参与的资本开支游戏，开始变成全球企业和国家级基础设施升级。

老黄电话会中反复强调：客户买的不是GPU，建的是AI factories。这句话不是营销，它改变了估值语言。按GPU估值，你盯ASP、出货量、毛利率、价格战。按AI factory估值，你盯的是token per watt、单位算力的可融资性、资产寿命和软件可持续性。英伟达卖的不是卡，是一台可以生产智能、产生收入、可以折旧、可以持续升级的资本设备。这就是和普通半导体公司的根本区别。

理解了这一层，市场上对它的四个最大误解才能重新审计。

第一，TPU和ASIC的威胁。现实和未来会是推理市场扩大十倍，其中一部分给ASIC，但Nvidia控制最复杂、最高价值、最可融资的AI factory层。未来推理是分层的。Google或者亚马逊这种内部稳定负载的，TPU有优势。但是模型快速变化、特别是Agentic AI时代下，它要长上下文、要工具调用、要多模型调度、要安全隔离、要CPU/GPU协同、要软件栈、要最快上线，这些都是英伟达的AI工厂系统所提供的。老黄强调"Nvidia正在推理里快速提升份额，Vera Rubin会比Grace Blackwell更成功，因为几乎所有frontier model company都会从一开始采用Vera Rubin"。ASIC吃的是标准化负载，Nvidia吃的是复杂性。Agentic AI越复杂，Nvidia的系统价值越高。

第二，CPU会不会削弱GPU。Agentic AI确实会带来新的CPU需求。但老黄说的很清楚：agent代理的调用组织跑在CPU上，但是真正的"thinking"还是依旧在GPU上。CPU负责组织行动，GPU负责产生智能。而且英伟达自己也有Vera CPU专为Agentic AI打造，公司说它打开2000亿美元TAM，今年已经有接近200亿美元CPU收入可见度。过去市场默认Agentic CPU增量自然流向x86/AMD。现在英伟达直接告诉市场：这块我也要。

第三，Data Center compute是不是低于预期。旧口径下compute仍然604亿，同比+77%，环比+18%，唯一略低于预期的指标。而Networking 148亿，同比+199%。增长结构确实在变化。英伟达不再只靠compute单项增长，而是靠GPU、networking、rack-scale system、NVLink、Spectrum-X、CPU、software共同组成AI factory收入群。但它提醒一件事：如果未来某一季compute走弱，而增长主要靠财报分类变化或生态资本循环维持，那就是真正的标红的风险信号。但现在的证据偏多头，Q2指引910亿超预期，毛利依然75%没有侵蚀。

第四，公司现金流是不是"循环融资"。Q1自由现金流接近486亿，向股东返还约200亿，新增800亿回购授权，季度股息从0.01美元提到0.25美元。生态资本循环的核心在于：这个循环如果建立在真实终端需求上，就是护城河。Google这种云服务、新云公司提供算力出租、模型公司Claude都已经实现盈利，已经初步证明了从token经济学角度，客户的收入大于成本，老型号GPU租金价格不断上调。

把这四个误解拆完，英伟达的轮廓就清楚了。它不只是高增长公司，它是Agentic AI时代的基础设施税收系统。征收对象是全球云厂商、AI native cloud、主权AI、企业on-prem、工业AI以及未来的robotics。

市场担心它太贵。但用FY27/FY28往前看PE并没有失控，真正贵的是PS。PS的核心解释来自75%毛利率、极高净利率、极高ROE和自由现金流能力。这些变量不塌，高PS可以被解释。当然要关注的风险：一旦毛利率掉、客户融资恶化、ACIE虚胖、compute走弱，估值会快速脆弱。

所以这不是无脑看多，是买方角度的审计。持续盯的是：ACIE能不能持续快于Hyperscale，Vera CPU能不能真正夺下Agentic的CPU TAM，Vera Rubin能不能在2027年再拉开一档推理经济学，自由现金流能不能同时撑R&D、供应链锁定、生态投资和股东回报而不变形为资本循环。

这一轮Agentic AI元年，市场已经把链条上所有便宜的位置买完了。HBM不便宜，光模块不便宜，云资本开支不便宜，NeoCloud不便宜，电力和数据中心REITs不便宜。最后剩下的不是一个被忽略的小票。是那个所有人都以为已经太大、太贵、太拥挤的公司。

英伟达不是最后一张廉价船票，是最后一张仍然能用合理估值买到Agentic AI主税收权的船票。市场看见了它。市场还没完全承认看见的是什么。`},
  {id:"2052749682175357314", dt:"2026-05-08", title:"新高泡沫还是旧范式破产：欢迎来到智能体AI元年的新世界", imgs:[], text:`不是我不明白是世界变化快。过去2个月暴涨几乎垂直角度上攻是新钱散户的疯狂FOMO还是老钱错过了一个时代。这是写给机构踏空者的指南。

不是写给散户，也不是写给那些每天追涨杀跌的人。真正需要重新读懂这轮行情的，恰恰是那些坐在投委会里、拿着旧估值框架、还在把AI当成"高CapEx泡沫"的传统资金。

他们看到的是AI CapEx失控。但没有看到AI调用量指数级别正在放大。他们看到的是数据中心资本开支。但没有看到云服务毛利、模型调用、企业工作流和Agentic AI正在重写回收路径。他们还在用互联网泡沫的模板理解AI。但这一次，头部公司不是先烧钱换用户，而是在用CapEx购买未来生产函数的控制权。这就是今天市场最大的认知差。

2026年不是简单的AI主题延续，而是Agentic AI自主决策智能体元年。AI不再只是回答问题。它开始执行任务，调用工具，编排流程，进入企业系统，消耗CPU、GPU、内存、存储、网络和云服务。

本文讨论三个问题。

第一，为什么短期市场不断新高，本身并不奇怪？强势行情都会经历一套熟悉的自我强化机制：基本面预期推动第一轮买入，动量资金和算法交易跟进，期权市场放大波动，多头加仓对冲，空头平仓回补，最后价格本身开始反过来证明叙事。

到了这个阶段，上涨已经不完全是基本面本身，而是信念传播速度的反映。然后，人们开始用价格证明叙事：因为股价大涨，所以故事是真的。因为故事是真的，所以股价还能涨。因为还能涨，所以所有风险都可以被暂时忽略。

第二，为什么普通强势行情最后容易sell the news？因为当故事被充分传播，预期被充分定价，早期资金通常会借利好兑现利润。后知后觉的资金在情绪最高点追入，成为流动性的接盘方。这就是传统机构最熟悉的剧本。

第三，为什么这一次可能不同？因为这次真正落后的，可能不是散户，而是传统机构。他们低估的不是某一只股票，而是Agentic AI对企业生产函数、云服务收入、模型调用毛利、CPU/GPU基础设施和软件工作流的系统性重写。

AI CapEx和AI收入之间的gap，正是今天市场最大的分歧。如果CapEx只是支出，这就是泡沫。如果CapEx是购买未来高毛利调用的入场券，这就是重估。

这一轮和互联网早期、移动互联网早期不一样。过去的科技革命，早期往往是用亏损换用户，用收入换市场，用烧钱换渗透率。投资者赌的是未来利润。但这一次，一些头部公司不是先烧钱再等远期兑现，而是一开始就展现出高毛利、高调用量、高现金流转化的特征。

Google Cloud、AI服务调用、模型API、企业AI工具链，本质上已经不是纯粹的未来故事。财报已经开始给出验证。AI不是只停留在CapEx账单上，它也已经开始出现在收入、毛利和客户使用强度里。这才是范式变化。

去年11月以来，随着Claude、Gemini、OpenAI等模型能力持续升级，AI不再只是回答问题，而是开始进入工具调用、任务执行、流程编排和自动化工作流。几个月的时间，完成了过去一个科技周期可能需要几年才能完成的认知跃迁。这不是普通的软件升级。这是AI从"内容生成工具"进入"生产执行系统"的开端。

而问题在于，很多主流机构投资者、CIO、传统基金经理，仍然用上一代科技周期的经验理解这一代AI。他们没有真正使用过这些工具。没有理解Agentic AI的执行能力。没有意识到模型从聊天工具变成企业操作系统之后，收入曲线和利润曲线会发生什么变化。他们仍然把AI当成一个主题，而不是一个生产函数底层的变化。这就是认知差。

所以这次和普通逼空行情最大的区别是：普通行情里，机构往往是早期参与者，后期把筹码派发给散户。而这一次，很多传统机构可能反而是后知后觉者。

早期动量资金完成第一轮上涨之后，真正的问题不是行情结束，而是那些落后的、低配的、怀疑的、还停留在旧框架里的大资金，是否会被迫重新定价AI。他们过去以为这只是GPU泡沫。后来发现云收入在加速。再后来发现推理调用量在增长。现在又要面对Agentic AI对CPU、内存、存储、网络、工作流和企业软件的二次拉动。这个时候，补仓不是因为他们突然乐观，而是因为他们发现原来的框架错了。

所以HBM涨了，存储涨了，光模块涨了，CPO涨了，电力涨了，数据中心REITs涨了，NeoCloud涨了，云厂商资本开支涨了，连过去被市场遗忘的CPU都重新被拉回讨论中心。

这也是为什么像巴菲特这一代传统价值投资者，甚至像Michael Burry这种擅长怀疑泡沫的人，可能都在这一轮AI范式里显得落后。他们不是不聪明，而是他们的经验来自旧世界。旧世界看估值。新世界先改变分母。当生产率、毛利结构、资本开支回收路径和企业软件形态同时变化时，简单用过去的泡沫框架套今天的AI，可能会错过最核心的变量。

所以短期不断新高，当然有拥挤交易、期权放大、逼空和动量资金的成分。但这一次更大的问题是：市场不是在单纯交易上涨本身，而是在重新给AI的利润池、基础设施链条和企业生产率定价。

普通强势行情，涨到最后是信念耗尽。这一次，如果Agentic AI的收入、毛利和算力需求继续被财报验证，那么上涨未必只是信念泡沫，而可能是传统机构被迫修正错误认知的开始。

/* 行情动态加载：部署版优先读取同目录 quotes.json（由GitHub Actions盘中更新）；失败则用上面内嵌数据 */
function boot(){

const CN = {bull:"#4ade80", bear:"#f87171", trade:"#60a5fa"};
const SLBL = {bull:"看多/核心仓", bear:"看空", trade:"波段/事件"};
const VS = {hit:["#4ade8022","#4ade80","已验证"], part:["#fbbf2422","#fbbf24","部分/进行中"], miss:["#f8717122","#f87171","未达成"], watch:["#60a5fa22","#60a5fa","观察中"]};

function judge(t){
  const q = DATA.quotes[t.tk], v = t.verdict, p = q.p;
  if (v.type==="range"){
    if (p >= v.lo && p <= v.hi) return {s:"hit", txt:`✓ 进入目标区 ${v.lo}-${v.hi}（现价 ${p}${v.entry?`，提示后 +${((p/v.entry-1)*100).toFixed(0)}%`:""}）`};
    if (p > v.hi) return {s:"hit", txt:`✓ 超出目标区上沿 ${v.hi}（现价 ${p}${v.bull?`，bull情景 ${v.bull}`:""}）`};
    const gap = ((v.lo/p-1)*100).toFixed(0);
    if (v.entry && p > v.entry) return {s:"part", txt:`◐ 方向正确（提示后 +${((p/v.entry-1)*100).toFixed(0)}%），距目标区 ${v.lo} 还差 ${gap}%`};
    return {s:"miss", txt:`✗ 未达目标区 ${v.lo}-${v.hi}，现价 ${p}（差 ${gap}%）`};
  }
  if (v.type==="band"){
    if (p>=v.mid && p<=v.hi) return {s:"hit", txt:`✓ ${v.lo}买入→${v.mid}目标已兑现；现价 ${p} 处于 ${v.mid}-${v.hi}（其判断：${v.hi}上限）`};
    if (p>v.hi) return {s:"part", txt:`△ 现价 ${p} 突破其 ${v.hi} 上限判断`};
    return {s:"part", txt:`◐ 现价 ${p}，回落至 ${v.mid} 目标下方`};
  }
  if (v.type==="mcap"){
    const m = DATA.quotes[t.tk].mcap;
    if (m >= v.target) return {s:"hit", txt:`✓ 已达成：目标市值 ${v.target}万亿，当前 ${m}万亿`};
    return {s:"part", txt:`◐ 当前市值 ${m}万亿 / 目标 ${v.target}万亿`};
  }
  if (v.type==="done") return {s:"hit", txt:v.note};
  if (v.type==="event") return {s:"part", txt:v.note};
  return {s:"watch", txt:v.note};
}

/* ---- parse series ---- */
function parseSeries(tk){
  const pts = DATA.series[tk].split(";").map(s=>{const [d,p]=s.split(":");return {d, p:+p};}).reverse();
  const q = DATA.quotes[tk];
  const qd = DATA.quoteDate.match(/(\d+)-(\d+)-(\d+)/);
  if (qd){ const lbl = (+qd[2])+"."+(+qd[3]); if (pts[pts.length-1].d !== lbl) pts.push({d:lbl, p:q.p}); }
  return pts;
}

/* ---- annotated chart ---- */
function drawChart(t, host){
  const pts = parseSeries(t.tk), dpr = devicePixelRatio||1;
  const cv = host.querySelector("canvas"), tip = host.querySelector(".ctip");
  const W = host.clientWidth, H = 230, padL = 46, padR = 10, padT = 14, padB = 22;
  cv.width = W*dpr; cv.height = H*dpr;
  const x = cv.getContext("2d"); x.setTransform(dpr,0,0,dpr,0,0);
  let lo = Math.min(...pts.map(p=>p.p)), hi = Math.max(...pts.map(p=>p.p));
  (t.lines||[]).forEach(l=>{ lo=Math.min(lo,l.y); hi=Math.max(hi,l.y); });
  const span = hi-lo || 1; lo -= span*.06; hi += span*.06;
  const X = i => padL + i*(W-padL-padR)/(pts.length-1);
  const Y = p => padT + (hi-p)*(H-padT-padB)/(hi-lo);
  /* target zone */
  const v = t.verdict;
  if (v.lo && v.hi && v.type==="range"){ x.fillStyle = "#4ade8012"; x.fillRect(padL, Y(v.hi), W-padL-padR, Y(v.lo)-Y(v.hi)); }
  /* grid + y labels */
  x.strokeStyle = "#23272f"; x.fillStyle = "#69707d"; x.font = "10px sans-serif"; x.textAlign = "right";
  for (let g=0; g<=4; g++){ const p = lo + (hi-lo)*g/4, y = Y(p);
    x.beginPath(); x.moveTo(padL,y); x.lineTo(W-padR,y); x.stroke(); x.fillText(p>=1000?(p/1000).toFixed(1)+"k":p.toFixed(p<50?1:0), padL-5, y+3); }
  /* x labels */
  x.textAlign = "center";
  [0, Math.floor(pts.length/3), Math.floor(pts.length*2/3), pts.length-1].forEach(i=> x.fillText(pts[i].d, X(i), H-7));
  /* target lines */
  (t.lines||[]).forEach(l=>{ const y=Y(l.y); x.strokeStyle=l.c; x.setLineDash([5,4]); x.beginPath(); x.moveTo(padL,y); x.lineTo(W-padR,y); x.stroke(); x.setLineDash([]);
    x.fillStyle=l.c; x.textAlign="left"; x.font="10px sans-serif"; x.fillText(l.l, padL+4, y-4); });
  /* price line */
  x.strokeStyle = CN[t.stance]; x.lineWidth = 1.8; x.beginPath();
  pts.forEach((p,i)=> i? x.lineTo(X(i),Y(p.p)) : x.moveTo(X(i),Y(p.p))); x.stroke(); x.lineWidth = 1;
  /* event markers */
  const marks = [];
  (t.events||[]).forEach(ev=>{
    const i = pts.findIndex(p=>p.d===ev.d); if (i<0) return;
    const mx = X(i), my = Y(pts[i].p);
    marks.push({mx, my, ev, price:pts[i].p});
    x.beginPath(); x.arc(mx,my,5.5,0,7); x.fillStyle="#e8b94a"; x.fill(); x.strokeStyle="#0f1115"; x.lineWidth=1.5; x.stroke(); x.lineWidth=1;
  });
  /* hover */
  cv.onmousemove = e => {
    const r = cv.getBoundingClientRect(), ex = e.clientX-r.left, ey = e.clientY-r.top;
    const m = marks.find(m=>(m.mx-ex)**2+(m.my-ey)**2 < 144);
    if (m){ tip.style.display="block";
      tip.style.left = Math.min(ex+12, W-250)+"px"; tip.style.top = Math.max(m.my-20, 4)+"px";
      tip.textContent = `📅 ${m.ev.d}（价 ${m.price}）\n${m.ev.t}\n👆 点击跳转原文`; }
    else tip.style.display="none";
  };
  cv.onmouseleave = ()=> tip.style.display="none";
  cv.onclick = e => {
    const r = cv.getBoundingClientRect(), ex = e.clientX-r.left, ey = e.clientY-r.top;
    if (marks.some(m=>(m.mx-ex)**2+(m.my-ey)**2 < 144) && !host.closest("#modal")) openTicker(t.tk);
  };
}

/* ---- knowledge graph ---- */
const NODES = [{id:"tigris", label:"Tigris", type:"blogger", r:30, info:"基金合伙人(CFA)。周报=短期策略，估值文=长期锚。Buy the structure."}];
DATA.themes.forEach(th => NODES.push({id:th.id, label:th.label, type:"theme", r:22, info:th.info}));
DATA.tickers.forEach(t => { const j=judge(t); NODES.push({id:t.tk, label:"$"+t.tk, type:t.stance, r:19, info:`[${VS[j.s][2]}] ${j.txt}\n\n· `+t.calls.join("\n· ")}); });
const EDGES = [];
DATA.themes.forEach(th => { EDGES.push(["tigris", th.id]); th.links.forEach(l=>EDGES.push([th.id,l])); });
["LLY","AEO","ORCL","GOOG","NVDA","AAPL"].forEach(t=>EDGES.push(["tigris",t]));
const KC = {blogger:"#e8b94a", theme:"#e8b94a", bull:"#4ade80", bear:"#f87171", trade:"#60a5fa"};
const gc = document.getElementById("gc"), gtx = gc.getContext("2d"), gw = document.getElementById("gwrap"), gtip = document.getElementById("gtip");
let GW, GH, dpr2 = devicePixelRatio||1;
function gsize(){ GW = gw.clientWidth; GH = gw.clientHeight; gc.width=GW*dpr2; gc.height=GH*dpr2; gtx.setTransform(dpr2,0,0,dpr2,0,0); }
const byId = {}; NODES.forEach((n,i)=>{ byId[n.id]=n; const a=i/NODES.length*6.283; n.x=400+Math.cos(a)*250; n.y=300+Math.sin(a)*220; n.vx=n.vy=0; });
const glinks = EDGES.map(([a,b])=>({a:byId[a],b:byId[b]}));
let ghover=null, gdrag=null;
function gtick(){
  for (let i=0;i<NODES.length;i++) for (let j=i+1;j<NODES.length;j++){
    const a=NODES[i],b=NODES[j]; let dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2),rep=4200/d2;
    dx/=d;dy/=d; a.vx-=dx*rep;a.vy-=dy*rep;b.vx+=dx*rep;b.vy+=dy*rep; }
  glinks.forEach(l=>{ let dx=l.b.x-l.a.x,dy=l.b.y-l.a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-120-(l.a.r+l.b.r))*.004;
    dx/=d;dy/=d; l.a.vx+=dx*f;l.a.vy+=dy*f;l.b.vx-=dx*f;l.b.vy-=dy*f; });
  NODES.forEach(n=>{ n.vx+=(GW/2-n.x)*.0008; n.vy+=(GH/2-n.y)*.0008;
    if(n!==gdrag){ n.x+=n.vx*=.85; n.y+=n.vy*=.85; }
    n.x=Math.max(n.r+6,Math.min(GW-n.r-6,n.x)); n.y=Math.max(n.r+6,Math.min(GH-n.r-6,n.y)); });
}
function gdraw(){
  gtx.clearRect(0,0,GW,GH);
  gtx.strokeStyle="#2c3340"; glinks.forEach(l=>{gtx.beginPath();gtx.moveTo(l.a.x,l.a.y);gtx.lineTo(l.b.x,l.b.y);gtx.stroke();});
  NODES.forEach(n=>{ const c=KC[n.type];
    gtx.beginPath(); gtx.arc(n.x,n.y,n.r,0,7);
    gtx.fillStyle = n===ghover? c : c+"30"; gtx.fill(); gtx.lineWidth=2; gtx.strokeStyle=c; gtx.stroke();
    gtx.fillStyle = n===ghover? "#0f1115":"#e8e8e8"; gtx.font="11.5px sans-serif"; gtx.textAlign="center";
    gtx.fillText(n.label, n.x, n.y+4); });
}
(function gloop(){ if (document.getElementById("graph").classList.contains("on")){ if(!GW) gsize(); gtick(); gdraw(); } requestAnimationFrame(gloop); })();
function gpick(e){ const r=gc.getBoundingClientRect(), x=e.clientX-r.left, y=e.clientY-r.top; return NODES.find(n=>(n.x-x)**2+(n.y-y)**2<(n.r+5)**2); }
gc.addEventListener("mousemove", e=>{ ghover=gpick(e);
  if(gdrag){ const r=gc.getBoundingClientRect(); gdrag.x=e.clientX-r.left; gdrag.y=e.clientY-r.top; }
  if (ghover){ gtip.style.display="block"; gtip.style.left=(ghover.x+ghover.r+12)+"px"; gtip.style.top=(ghover.y-10)+"px"; gtip.textContent=ghover.info; }
  else gtip.style.display="none";
  gc.style.cursor = ghover?"pointer":"grab"; });
gc.addEventListener("mousedown", e=>{ gdrag=gpick(e); });
gc.addEventListener("mouseup", e=>{ const n=gpick(e);
  if (n && DATA.quotes[n.id]) openTicker(n.id);
  gdrag=null; });

/* ---- 行动清单 ---- */
function renderTodo(){
  const groups = [["price","🎯 价格触发（按距离排序）"],["event","📅 事件触发"],["rule","📐 纪律规则（恒常）"]];
  const doneSet = new Set(JSON.parse(localStorage.getItem("tigris_todo_done")||"[]"));
  const html = groups.map(([g, title])=>{
    let items = DATA.actions.filter(a=>a.grp===g);
    if (g==="price"){
      items = items.map(a=>{ const p = DATA.quotes[a.tk]?.p;
        a._dist = p ? (a.trig/p-1)*100 : null; return a;
      }).sort((x,y)=>Math.abs(x._dist??99)-Math.abs(y._dist??99));
    }
    return `<div class="todogrp"><h3>${title}</h3>` + items.map(a=>{
      const key = (a.tk||"")+"|"+a.cond.slice(0,30);
      const done = doneSet.has(key);
      let distHtml = "";
      if (a._dist != null){
        const ad = Math.abs(a._dist), cls = ad<6?"near":ad<15?"mid2":"far";
        distHtml = `<span class="tdist ${cls}">${a._dist>0?"还需涨":"还需跌"} ${ad.toFixed(1)}%</span>`;
      }
      return `<div class="titem${done?" done":""}">
        <input type="checkbox" ${done?"checked":""} data-key="${key}">
        <div class="tbody2"><div class="tcond">${a.tk && a.tk!=="宏观" && a.tk!=="纪律" ? `<span class="tkx">$${a.tk}</span> ` : ""}${a.cond}</div>
        <div class="tact">→ ${a.act} <span style="opacity:.6">｜来源：${a.src}</span></div></div>
        ${distHtml}</div>`;
    }).join("") + `</div>`;
  }).join("");
  document.getElementById("todolist").innerHTML = html;
  document.querySelectorAll('#todolist input').forEach(cb => cb.addEventListener("change", ()=>{
    const s = new Set(JSON.parse(localStorage.getItem("tigris_todo_done")||"[]"));
    cb.checked ? s.add(cb.dataset.key) : s.delete(cb.dataset.key);
    localStorage.setItem("tigris_todo_done", JSON.stringify([...s]));
    renderTodo();
  }));
}

const modal = document.getElementById("modal");
function postHTML(p){
  return `<div class="post">
    <div class="ph"><span class="badge ${p.k==="pub"?"kpub":"ksubs"}">${p.k==="subs"?"🔒 订阅":p.k==="art"?"📰 长文":"公开"}</span>

    ${DATA.articles.some(a=>a.id===p.id) ? `<span class="readbtn" onclick="openReader('${p.id}')">📖 阅读全文</span>` : ""}</div>`;
}
function openTicker(tk){
  const t = DATA.tickers.find(x=>x.tk===tk); if (!t) return;
  const q = DATA.quotes[tk], j = judge(t), vs = VS[j.s];
  document.getElementById("mtitle").textContent = "$"+tk+" · "+t.name;
  const st = document.getElementById("mstance");
  st.textContent = SLBL[t.stance]; st.style.background = CN[t.stance]+"22"; st.style.color = CN[t.stance];
  document.getElementById("mprice").innerHTML = `${q.p.toLocaleString()} <span class="${q.chg>=0?"up":"down"}">${q.chg>=0?"+":""}${q.chg}%</span> <small style="color:var(--sub)">(${DATA.quoteDate})</small>`;
  const mv = document.getElementById("mverdict");
  mv.style.background = vs[0]; mv.style.color = vs[1]; mv.innerHTML = `<b>[${vs[2]}]</b> ${j.txt}`;
  document.getElementById("mevents").innerHTML = (t.events||[]).map(ev=>
    `<div class="mevt"><b>${ev.d}</b> ${esc(ev.t)}</div>`).join("") || `<p class="note">暂无标注判断</p>`;
  const acts = DATA.actions.filter(a=>a.tk===tk);
  document.getElementById("mactions").innerHTML = acts.length ? acts.map(a=>{
    let dist = "";
    if (a.grp==="price" && q){ const d=(a.trig/q.p-1)*100, ad=Math.abs(d);
      dist = `<span class="tdist ${ad<6?"near":ad<15?"mid2":"far"}" style="float:right">${d>0?"还需涨":"还需跌"} ${ad.toFixed(1)}%</span>`; }
    return `<div class="mevt">${dist}<b>${esc(a.cond)}</b><br>→ ${esc(a.act)}<br><span style="opacity:.55">来源：${a.src}</span></div>`;
  }).join("") : `<p class="note">暂无待触发行动点（见"行动清单"中的纪律规则）</p>`;
  document.getElementById("mposts").innerHTML =
    DATA.posts.filter(p=>p.t.includes("$"+tk)).map(postHTML).join("") || `<p class="note">存档中暂无相关原文</p>`;
  modal.classList.add("on");
  requestAnimationFrame(()=> drawChart(t, document.getElementById("mchart")));
}
